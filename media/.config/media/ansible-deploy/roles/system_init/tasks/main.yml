    name:
      - git
      - zip
      - unzip
      - curl
      - nala
      - stow
      - ncdu
      - xwayland
      - nwg-look
      - picard
      - power-profiles-daemon
      - terminator
      - fastfetch
      - cmatrix
      - kitty
      - zsh
      - bat
      - eza
      - zoxide
      - fzf
      - starship
      - fish
      - mpd
      - mpc
      - foot
      - ncmpcpp
      - mpdris2
      - papirus-icon-theme
      - xfce4-panel-profiles
      - xfce4-docklike-plugin
      - xfce4-mpc-plugin
      - deja-dup
      - fcitx5
      - fcitx5-pinyin
      - fcitx5-rime
      - pipes-sh
      - fd-find
      - lightdm-gtk-greeter-settings
      - aria2
      - dconf-cli
      - flameshot
