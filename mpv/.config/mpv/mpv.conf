# uosc provides seeking & volume indicators (via flash-timeline and flash-volume commands)
# if you decide to use them, you don't need osd-bar
osd-bar=no

# uosc will draw its own window controls and border if you disable window border
border=no
panscan=1.0

# 设置播放器默认字体（影响 OSC 和 OSD 提示）
osd-font='Microsoft YaHei'
# 如果有字幕显示问题，顺便设置字幕字体
sub-font='Microsoft YaHei'

# ==========================================
# 1. 播放进度记忆
# ==========================================
# 退出时自动保存当前播放位置
save-position-on-quit=yes

# ==========================================
# 2. 视频与图形渲染优化（解决 Vulkan 报错）
# ==========================================
# 使用成熟稳定的 gpu 渲染器，不再使用容易报错的 gpu-next
vo=gpu
# 强制使用 OpenGL API，彻底根治 libplacebo Vulkan 报错
gpu-api=opengl
# 开启硬件解码加速（auto-safe 会自动选择最稳定安全的硬解方式）
hwdec=no

# ==========================================
# 3. 窗口与常规设置
# ==========================================
# 启动时保持原始视频大小（如果太大，则限制在屏幕的 85%）
autofit-larger=85%x85%
# 播放完毕后不要自动关闭窗口
keep-open=yes
# 允许空格键暂停、方向键快进等常规操作
input-media-keys=yes

# ==========================================
# 4. 音频与音频输出（针对你的 PipeWire 环境）
# ==========================================
# 优先使用 PipeWire 或 PulseAudio 输出音频
ao=pipewire,pulse,alsa
# 播放时自动将音量最大化拉满到 100%（默认通常较小）
volume=100
# 限制最大放大音量为 130%
volume-max=130

# ==========================================
# 5. 字幕与语言偏好设置
# ==========================================
# 优先加载中文字幕，其次是英文字幕
slang=chs,sc,zh,eng
# 优先加载中文音轨，其次是英文音轨
alang=chs,zh,eng
# 如果有外挂字幕，自动加载同名或包含关键词的字幕
sub-auto=all
# 字幕字体大小与样式微调（防止部分中文字幕发虚）
sub-font-size=45
sub-blur=0.2

