#################################
#             基础设置          #
#################################
# 使用 glx 后端能有效解决 XFCE 下的画面撕裂
backend = "xrender";
vsync = true;

# 减少资源占用的微调
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

#################################
#             圆角 (Corners)    #
#################################
# 唯一保留的视觉效果
corner-radius = 15;

# 排除不需要圆角的窗口（面板和桌面）
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'xfce4-panel'"
];

#################################
#             禁用项            #
#################################
# 显式关闭阴影
shadow = false;

# 显式关闭淡入淡出
fading = false;

# 显式关闭模糊
blur: {
  method = "none";
}

# 显式关闭动画 (如果你使用的是带动画的分支)
animations = false;

#################################
#             其他设置          #
#################################
# 保持窗口全透明，不设置任何变暗效果
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
active-opacity = 1.0;

# 针对 XFCE 的聚焦优化
focus-exclude = [ "class_g = 'Cairo-clock'" ];

# 窗口类型设置，确保面板不被干扰
wintypes:
{
  tooltip = { fade = false; shadow = false; opacity = 1.0; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};

