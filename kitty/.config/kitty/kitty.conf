# ============================================================
# 基础设置 (Basic Settings)
# ============================================================

# 字体配置
font_size              13
macos_thicken_font     0.2
macos_option_as_alt    left

# 光标配置
cursor_shape           beam
cursor_beam_thickness  2.0
cursor_blink_interval  -1
cursor_trail           5

# 鼠标配置
url_style              straight
copy_on_select         yes
mouse_map right press ungrabbed paste_from_clipboard
mouse_map right press grabbed copy_to_clipboard

# 编辑器和Shell
editor                 nvim
shell                  fish
shell_integration      enabled
force_ltr              yes

# ============================================================
# 窗口设置 (Window Settings)
# ============================================================

# 窗口边距和内边距
window_margin_width      1
window_padding_width     1
single_window_margin_width -10

# 窗口外观
background_opacity      0.98
background_blur         50
macos_window_resizable  yes
macos_quit_when_last_window_closed yes
hide_window_decorations no
draw_minimal_borders    no

# 窗口位置和大小
placement_strategy      center
remember_window_size    yes
remember_window_position yes
initial_window_width    110c
initial_window_height   30c

# 窗口提示
tab_activity_symbol     " ● "
bell_on_tab             ""
paste_actions           confirm
allow_remote_control    yes
notify_on_cmd_finish    invisible 3.0 notify-bell

# ============================================================
# 滚动条配置 (Scrollback Settings)
# ============================================================

scrollback_lines              100000
scrollback_pager_history_size 5
scrollbar                     scrolled

# ============================================================
# Tab 栏配置 (Tab Bar Configuration)
# ============================================================

# Tab 栏基本设置
tab_bar_style           custom
tab_bar_edge            top
tab_bar_align           left
# tab_bar_min_tabs        1
tab_switch_strategy     previous
tab_bar_margin_width    0.0
tab_bar_margin_height   5.0 0.0

# Tab 标题样式
tab_separator           ""
tab_fade                0 0 0 0
tab_title_template      "{fmt.fg.red}{fmt.bg.default}{bell_symbol}{activity_symbol}{fmt.fg.tab}{fmt.bg.default}◎ {index}:{title} "
active_tab_title_template "{fmt.fg.red}{fmt.bg.default}{bell_symbol}{activity_symbol}{fmt.fg.tab}{fmt.bg.default}{fmt.fg._FFFF00} {index}:{title} "

# Tab 字体样式
active_tab_font_style   bold-italic
inactive_tab_font_style normal

# ============================================================
# 主题配置 (Theme Configuration)
# ============================================================

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# 1984 Dark Theme
include current-theme.conf
# END_KITTY_THEME

